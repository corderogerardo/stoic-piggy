<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:inline-flex;align-items:center;justify-content:center;line-height:0;">
  <svg width="{{ size }}" height="{{ size }}" viewBox="0 0 120 124" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
    <!-- zen aura ring -->
    <sc-if value="{{ isZen }}" hint-placeholder-val="{{ true }}">
      <circle cx="60" cy="66" r="54" fill="none" stroke="#A8DADC" stroke-width="2" stroke-dasharray="3 7" opacity="0.55"></circle>
    </sc-if>

    <!-- ears -->
    <path d="M34 44 L24 18 Q23 13 29 16 L52 33 Z" fill="#EFA59E"></path>
    <path d="M86 44 L96 18 Q97 13 91 16 L68 33 Z" fill="#EFA59E"></path>
    <path d="M36 40 L30 24 L48 35 Z" fill="#E63946" opacity="0.30"></path>
    <path d="M84 40 L90 24 L72 35 Z" fill="#E63946" opacity="0.30"></path>

    <!-- head -->
    <circle cx="60" cy="66" r="41" fill="#F4ACA4"></circle>
    <!-- blush -->
    <circle cx="32" cy="74" r="7.5" fill="#E63946" opacity="0.16"></circle>
    <circle cx="88" cy="74" r="7.5" fill="#E63946" opacity="0.16"></circle>

    <!-- snout -->
    <ellipse cx="60" cy="78" rx="21" ry="14.5" fill="#ED968E"></ellipse>
    <ellipse cx="52" cy="78" rx="3.4" ry="5.4" fill="#1D3557" opacity="0.62"></ellipse>
    <ellipse cx="68" cy="78" rx="3.4" ry="5.4" fill="#1D3557" opacity="0.62"></ellipse>

    <!-- ZEN eyes: serene closed -->
    <sc-if value="{{ isZen }}" hint-placeholder-val="{{ true }}">
      <g stroke="#1D3557" stroke-width="3.2" stroke-linecap="round" fill="none">
        <path d="M39 58 Q46.5 64 54 58"></path>
        <path d="M66 58 Q73.5 64 81 58"></path>
      </g>
    </sc-if>

    <!-- HAPPY eyes: smiling arcs -->
    <sc-if value="{{ isHappy }}" hint-placeholder-val="{{ true }}">
      <g stroke="#1D3557" stroke-width="3.4" stroke-linecap="round" fill="none">
        <path d="M39 60 Q46.5 52 54 60"></path>
        <path d="M66 60 Q73.5 52 81 60"></path>
      </g>
    </sc-if>

    <!-- TEMPTED eyes: wide + sweat -->
    <sc-if value="{{ isTempted }}" hint-placeholder-val="{{ true }}">
      <g>
        <circle cx="46.5" cy="57" r="7" fill="#FFFFFF" stroke="#1D3557" stroke-width="2.2"></circle>
        <circle cx="73.5" cy="57" r="7" fill="#FFFFFF" stroke="#1D3557" stroke-width="2.2"></circle>
        <circle cx="48" cy="58.5" r="3.4" fill="#1D3557"></circle>
        <circle cx="75" cy="58.5" r="3.4" fill="#1D3557"></circle>
        <path d="M95 50 Q99 58 95 62 Q91 58 95 50 Z" fill="#A8DADC"></path>
      </g>
    </sc-if>

    <!-- THINKING eyes: looking up + dots -->
    <sc-if value="{{ isThinking }}" hint-placeholder-val="{{ true }}">
      <g>
        <circle cx="46.5" cy="57" r="6.4" fill="#FFFFFF" stroke="#1D3557" stroke-width="2.2"></circle>
        <circle cx="73.5" cy="57" r="6.4" fill="#FFFFFF" stroke="#1D3557" stroke-width="2.2"></circle>
        <circle cx="46.5" cy="53.5" r="3" fill="#1D3557"></circle>
        <circle cx="73.5" cy="53.5" r="3" fill="#1D3557"></circle>
        <g fill="#457B9D">
          <circle cx="96" cy="40" r="2.4"></circle>
          <circle cx="104" cy="34" r="3.1"></circle>
          <circle cx="113" cy="27" r="3.8"></circle>
        </g>
      </g>
    </sc-if>
  </svg>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:160,&quot;height&quot;:160},&quot;mood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;zen&quot;,&quot;happy&quot;,&quot;tempted&quot;,&quot;thinking&quot;],&quot;default&quot;:&quot;zen&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:96,&quot;min&quot;:32,&quot;max&quot;:240,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const mood = this.props.mood || 'zen';
    return {
      size: this.props.size || 96,
      isZen: mood === 'zen',
      isHappy: mood === 'happy',
      isTempted: mood === 'tempted',
      isThinking: mood === 'thinking',
    };
  }
}
</script>
</body>
</html>
