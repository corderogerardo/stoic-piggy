name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # End-to-end suites need browsers (Playwright) or a device/emulator (Maestro),
  # so they're kept out of the default fast CI. Enable as needed:
  #
  # e2e-web:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: pnpm/action-setup@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: 22, cache: pnpm }
  #     - run: pnpm install --frozen-lockfile
  #     - run: pnpm exec playwright install --with-deps chromium
  #     - run: pnpm --filter @stoicpiggy/landing test:e2e
  #     - run: pnpm --filter @stoicpiggy/parents test:e2e
