appId: com.stoicpiggy.app
tags:
  - auth
---
# Screen: Task History. Opened from the Tasks tab when the kid has approved tasks.
- runFlow: ../subflows/sign-in.yaml
- tapOn:
    id: "tab-tasks"
- extendedWaitUntil:
    visible:
      id: "tasks-screen"
    timeout: 30000

# Verify the history link is rendered (approvedCount > 0).
- extendedWaitUntil:
    visible:
      id: "tasks-history-link"
    timeout: 30000

# Same expo-dev-client gear button workaround as flow 10: navigate via deep link.
- openLink: "exp+stoicpiggy://task-history"

# Verify the history modal opened.
- extendedWaitUntil:
    visible:
      id: "task-history-screen"
    timeout: 20000

# Dismiss by tapping the back arrow and return to Tasks.
- tapOn:
    id: "task-history-back"
- extendedWaitUntil:
    visible:
      id: "tasks-screen"
    timeout: 20000
