appId: com.stoicpiggy.app
tags:
  - auth
---
# Screen: Mission History. Opened from the Quests tab when the kid has completed missions.
- runFlow: ../subflows/sign-in.yaml
- tapOn:
    id: "tab-quests"
- extendedWaitUntil:
    visible:
      id: "quests-screen"
    timeout: 30000

# Verify the history link is rendered (completedCount > 0).
- extendedWaitUntil:
    visible:
      id: "quests-history-link"
    timeout: 30000

# expo-dev-client SDK 56 places a floating gear button in the top-right corner that
# completely covers the quests-history-link element (both sit at ~70–75% from left,
# ~10% from top). No tap coordinate bypasses it. Navigate via deep link instead —
# same Expo Router route, tests the screen and back-nav without the dev-build blocker.
- openLink: "exp+stoicpiggy://mission-history"

# Verify the history modal opened.
- extendedWaitUntil:
    visible:
      id: "mission-history-screen"
    timeout: 20000

# Dismiss by tapping the back arrow and return to Quests.
- tapOn:
    id: "mission-history-back"
- extendedWaitUntil:
    visible:
      id: "quests-screen"
    timeout: 20000
